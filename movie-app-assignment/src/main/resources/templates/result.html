<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Movie Results</h2>

<table border="1">
    <tr>
        <th>Movie Name</th>
        <th>Rating</th>
        <th>Genre</th>
    </tr>

    <tr th:each="movie : ${movies}">
        <td th:text="${movie.movieName}"></td>
        <td th:text="${movie.rating}"></td>
        <td th:text="${movie.genre}"></td>
    </tr>
</table>

<br><br>
<a href="/">Go Back</a>

</body>
</html>
